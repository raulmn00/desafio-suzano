# Atualizações automáticas de dependências. Agrupa minor/patch para reduzir ruído
# de PRs; atualizações de segurança vêm à parte (não agrupadas).
version: 2
updates:
  # Workspace pnpm (lockfile único na raiz cobre backend + frontend + raiz).
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dependencias-minor-patch:
        patterns: ['*']
        update-types: ['minor', 'patch']

  # GitHub Actions usadas nos workflows (CI/CD/CodeQL).
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly

  # Imagem base do Dockerfile do backend.
  - package-ecosystem: docker
    directory: '/backend'
    schedule:
      interval: weekly
