name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint, test, coverage, e2e)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ovgs
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: ovgs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ovgs -d ovgs"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ovgs:${{ secrets.CI_POSTGRES_PASSWORD }}@localhost:5432/ovgs?schema=public
      DIRECT_URL: postgresql://ovgs:${{ secrets.CI_POSTGRES_PASSWORD }}@localhost:5432/ovgs?schema=public
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Gerar JWT_SECRET efêmero (sem segredo no YAML)
        run: echo "JWT_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"
      - name: Auditoria de dependências (informativo, não bloqueia)
        run: pnpm audit --audit-level=high
        continue-on-error: true
      - name: Prisma generate
        run: pnpm --filter @ovgs/backend exec prisma generate
      - name: Lint
        run: pnpm --filter @ovgs/backend lint
      - name: Unit tests + coverage (gate 95%)
        run: pnpm --filter @ovgs/backend test:cov
      - name: Build
        run: pnpm --filter @ovgs/backend build
      - name: Apply migrations
        run: pnpm --filter @ovgs/backend exec prisma migrate deploy
      - name: E2E (integration)
        run: pnpm --filter @ovgs/backend test:e2e

  frontend:
    name: Frontend (lint, build, cypress)
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm --filter @ovgs/frontend lint
      - name: Build
        run: pnpm --filter @ovgs/frontend build
      - name: Install Cypress binary
        run: pnpm --filter @ovgs/frontend exec cypress install
      - name: Cypress component tests
        uses: cypress-io/github-action@v7
        with:
          working-directory: frontend
          component: true
          install: false
        env:
          CYPRESS_COVERAGE: 'true'

  e2e:
    name: E2E (frontend ↔ backend real)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ovgs
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: ovgs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ovgs -d ovgs"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ovgs:${{ secrets.CI_POSTGRES_PASSWORD }}@localhost:5432/ovgs?schema=public
      DIRECT_URL: postgresql://ovgs:${{ secrets.CI_POSTGRES_PASSWORD }}@localhost:5432/ovgs?schema=public
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 8080
      CORS_ORIGINS: '*'
      VITE_API_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Gerar JWT_SECRET efêmero (sem segredo no YAML)
        run: echo "JWT_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"
      - name: Prisma generate + migrate + seed
        run: |
          pnpm --filter @ovgs/backend exec prisma generate
          pnpm --filter @ovgs/backend exec prisma migrate deploy
          pnpm --filter @ovgs/backend prisma:seed
      - name: Build backend
        run: pnpm --filter @ovgs/backend build
      - name: Subir backend (bg) e aguardar /health
        working-directory: backend
        run: |
          nohup node dist/main.js > /tmp/ovgs-backend.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/health >/dev/null 2>&1; then
              echo "✅ backend no ar (tentativa $i)"; exit 0
            fi
            sleep 2
          done
          echo "❌ backend não respondeu em 60s — log:"; cat /tmp/ovgs-backend.log; exit 1
      - name: Build frontend
        run: pnpm --filter @ovgs/frontend build
      - name: Install Cypress binary
        run: pnpm --filter @ovgs/frontend exec cypress install
      - name: Cypress E2E (mock + API real)
        run: pnpm --filter @ovgs/frontend cy:e2e:ci
