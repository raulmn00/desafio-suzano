# Análise estática de segurança (CodeQL) para JS/TS — push/PR na main + semanal.
# Resultados aparecem na aba Security → Code scanning.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # toda segunda, 06:00 UTC

jobs:
  analyze:
    name: Analyze (JS/TS)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # build-mode none: JS/TS não precisa de compilação para a análise.
          build-mode: none
      - uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'
