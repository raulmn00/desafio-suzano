# CD automático. A cada CI verde na branch `main`, deploya o backend (Cloud Run
# function gen2) e, na sequência, o frontend (Vercel). Também é disparável à mão
# (workflow_dispatch).
#
# Autenticação no GCP via Workload Identity Federation (keyless — SEM chave JSON
# de longa duração no GitHub). Secrets do repositório:
#   WIF_PROVIDER          resource name do provider OIDC (workload identity)
#   WIF_SERVICE_ACCOUNT   e-mail da service account de deploy
#   NEON_DATABASE_URL     connection string POOLED do Neon (runtime)
#   NEON_DIRECT_URL       connection string DIRETA do Neon (migrations)
#   JWT_SECRET            segredo de assinatura dos JWT
#   REDIS_URL             URL do Redis (Upstash) p/ cache distribuído
#   VERCEL_TOKEN          token da Vercel (Account Settings → Tokens)
#
# Config 100% reproduzível: o PRÓPRIO deploy define toda a env de produção —
# valores não-sensíveis como literais e os sensíveis vindos dos secrets acima —
# via --update-env-vars (merge: não mexe em vars gerenciadas pela plataforma).
name: CD (deploy)

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
  workflow_dispatch:

# Um deploy de produção por vez (não cancela um deploy em andamento).
concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy-backend:
    name: Backend → Cloud Run (gen2)
    runs-on: ubuntu-latest
    # Só deploya em push na main com CI verde — ou disparo manual.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    permissions:
      contents: read
      id-token: write # necessário p/ OIDC (Workload Identity Federation)
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
        with:
          # No gatilho workflow_run, faz checkout do MESMO commit que passou no CI.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Aplicar migrations (Neon, DIRECT_URL)
        env:
          DATABASE_URL: ${{ secrets.NEON_DIRECT_URL }}
          DIRECT_URL: ${{ secrets.NEON_DIRECT_URL }}
        run: pnpm prisma migrate deploy

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: desafio-suzano

      - name: Deploy Cloud Run function gen2 (env completa e reproduzível)
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.NEON_DIRECT_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          # Delimitador custom (^|^): os valores contêm ':' '/' '@' '&' '=' mas
          # nunca '|', então o parsing das envs fica seguro. --remove-env-vars
          # apaga a variável LEGADA JWT_EXPIRES_IN (substituída por ACCESS/REFRESH).
          gcloud functions deploy ovgs-api \
            --gen2 --runtime=nodejs22 --region=us-central1 \
            --source=. --entry-point=ovgs --trigger-http --allow-unauthenticated \
            --memory=512Mi --min-instances=0 \
            --update-env-vars="^|^NODE_ENV=production|CORS_ORIGINS=*|LOG_LEVEL=info|CACHE_TTL_MS=30000|JWT_ACCESS_EXPIRES_IN=15m|JWT_REFRESH_EXPIRES_IN=7d|DATABASE_URL=${DATABASE_URL}|DIRECT_URL=${DIRECT_URL}|JWT_SECRET=${JWT_SECRET}|REDIS_URL=${REDIS_URL}" \
            --remove-env-vars=JWT_EXPIRES_IN

  deploy-frontend:
    name: Frontend → Vercel
    runs-on: ubuntu-latest
    needs: deploy-backend # só sobe o front depois do backend (e da migration)
    env:
      # IDs do projeto Vercel (não são sensíveis — orgId/projectId públicos).
      VERCEL_ORG_ID: team_nOiXpkR5xbe7jVtbmag2fxc9
      VERCEL_PROJECT_ID: prj_q5dFI0qi4Y6Qb6mno00dnYZegSX9
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: pnpm/action-setup@v6 # pnpm no PATH p/ o `vercel build` (lockfile pnpm)
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Instalar Vercel CLI
        run: npm i -g vercel@latest
      - name: Pull das configs do projeto (production)
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - name: Build (prebuilt, respeita Root Directory = frontend)
        run: vercel build --prod --token="$VERCEL_TOKEN"
      - name: Deploy para produção
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
