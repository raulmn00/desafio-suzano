# CD automático. A cada CI verde na branch `main`, deploya o backend (Cloud Run
# function gen2) e, na sequência, o frontend (Vercel). Também é disparável à mão
# (workflow_dispatch).
#
# Autenticação no GCP via Workload Identity Federation (keyless — SEM chave JSON
# de longa duração no GitHub). Secrets DO GITHUB (mínimos, não-sensíveis):
#   WIF_PROVIDER          resource name do provider OIDC (workload identity)
#   WIF_SERVICE_ACCOUNT   e-mail da service account de deploy
#
# Todos os SEGREDOS do projeto vivem no GCP Secret Manager (não no GitHub):
#   ovgs-database-url · ovgs-direct-url · ovgs-jwt-secret · ovgs-redis-url ·
#   ovgs-vercel-token
# O backend os consome via --set-secrets (montados como env no runtime, lidos
# pela SA dedicada e least-privilege `ovgs-runtime`); o CD lê direct-url (migration)
# e vercel-token (frontend) com `gcloud secrets versions access`. Config NÃO
# sensível (NODE_ENV, CORS_ORIGINS, LOG_LEVEL, TTL, expiries) fica como literal.
name: CD (deploy)

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
  workflow_dispatch:

# Um deploy de produção por vez (não cancela um deploy em andamento).
concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy-backend:
    name: Backend → Cloud Run (gen2)
    runs-on: ubuntu-latest
    # Só deploya em push na main com CI verde — ou disparo manual.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    permissions:
      contents: read
      id-token: write # necessário p/ OIDC (Workload Identity Federation)
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
        with:
          # No gatilho workflow_run, faz checkout do MESMO commit que passou no CI.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        working-directory: .

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: desafio-suzano

      - name: Aplicar migrations (DIRECT_URL do Secret Manager)
        run: |
          DURL="$(gcloud secrets versions access latest --secret=ovgs-direct-url)"
          echo "::add-mask::$DURL" # nunca aparece nos logs
          DATABASE_URL="$DURL" DIRECT_URL="$DURL" pnpm prisma migrate deploy

      - name: Deploy Cloud Run function gen2 (segredos via Secret Manager)
        run: |
          # Config não-sensível como literal (--update-env-vars); SEGREDOS montados
          # do Secret Manager (--set-secrets); a função roda como a SA dedicada
          # `ovgs-runtime` (least-privilege: só secretAccessor nos segredos).
          gcloud functions deploy ovgs-api \
            --gen2 --runtime=nodejs22 --region=us-central1 \
            --source=. --entry-point=ovgs --trigger-http --allow-unauthenticated \
            --memory=512Mi --min-instances=0 \
            --service-account=ovgs-runtime@desafio-suzano.iam.gserviceaccount.com \
            --update-env-vars="NODE_ENV=production,CORS_ORIGINS=*,LOG_LEVEL=info,CACHE_TTL_MS=30000,JWT_ACCESS_EXPIRES_IN=15m,JWT_REFRESH_EXPIRES_IN=7d" \
            --set-secrets="DATABASE_URL=ovgs-database-url:latest,DIRECT_URL=ovgs-direct-url:latest,JWT_SECRET=ovgs-jwt-secret:latest,REDIS_URL=ovgs-redis-url:latest"

  deploy-frontend:
    name: Frontend → Vercel
    runs-on: ubuntu-latest
    needs: deploy-backend # só sobe o front depois do backend (e da migration)
    permissions:
      contents: read
      id-token: write # OIDC p/ ler o token da Vercel no Secret Manager
    defaults:
      run:
        # Roda no subprojeto: a Vercel builda só `frontend/` (npm isolado), sem
        # disparar a detecção do workspace pnpm da raiz (que quebra `vite build`).
        working-directory: frontend
    env:
      # IDs do projeto Vercel (não são sensíveis — orgId/projectId públicos).
      VERCEL_ORG_ID: team_nOiXpkR5xbe7jVtbmag2fxc9
      VERCEL_PROJECT_ID: prj_q5dFI0qi4Y6Qb6mno00dnYZegSX9
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: desafio-suzano
      - name: Instalar Vercel CLI
        run: npm i -g vercel@latest
      # Deploy NÃO-prebuilt: sobe o source e a Vercel builda na infra dela,
      # respeitando Root Directory, install/build command e a env de produção
      # (VITE_API_URL). O token da Vercel vem do Secret Manager (não do GitHub).
      - name: Deploy para produção (token da Vercel via Secret Manager)
        run: |
          VTOKEN="$(gcloud secrets versions access latest --secret=ovgs-vercel-token)"
          echo "::add-mask::$VTOKEN"
          vercel pull --yes --environment=production --token="$VTOKEN"
          vercel deploy --prod --token="$VTOKEN"
