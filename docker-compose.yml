# OVGS — ambiente de desenvolvimento.
# `docker compose up -d postgres` sobe apenas o banco (rode o backend com pnpm).
# `docker compose --profile full up`  sobe banco + backend já com migrations aplicadas.

services:
  postgres:
    image: postgres:16-alpine
    container_name: ovgs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ovgs
      POSTGRES_PASSWORD: ovgs
      POSTGRES_DB: ovgs
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - ovgs-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ovgs -d ovgs']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    profiles: ['full']
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ovgs-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ovgs:ovgs@postgres:5432/ovgs?schema=public
      DIRECT_URL: postgresql://ovgs:ovgs@postgres:5432/ovgs?schema=public
      # Sem segredo de produção versionado: o valor vem do ambiente do host.
      # O default abaixo é explicitamente INSEGURO e só serve para o stack local
      # (NODE_ENV=development). Em produção, defina um JWT_SECRET forte e único
      # (a app recusa subir com segredo padrão/fraco quando NODE_ENV=production).
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-local-secret-change-me-0123456789}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      SEED_OPERADOR_EMAIL: operador@ovgs.dev
      SEED_OPERADOR_SENHA: operador123
      SEED_AUDITOR_EMAIL: auditor@ovgs.dev
      SEED_AUDITOR_SENHA: auditor123
      PORT: 8080
      CORS_ORIGINS: '*'
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CACHE_TTL_MS: ${CACHE_TTL_MS:-30000}
    ports:
      - '8080:8080'

volumes:
  ovgs-pgdata:
